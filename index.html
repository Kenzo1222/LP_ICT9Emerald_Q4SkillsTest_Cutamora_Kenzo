<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: lightblue;
            font-family: Arial, sans-serif;
        }

        .login-container {
            width: 350px;
            margin: 80px auto;
            padding: 30px;
            border-radius: 20px;
            background: #f5f5f5;
            box-shadow: 0 10px 25px rgba(37, 28, 28, 0.1);
            text-align: center;
        }

        .profile-img {
            width: 70px;
            margin-bottom: 10px;
        }

        h2 {
            margin-bottom: 20px;
            color: #555;
        }

        .form-control {
            border-radius: 20px;
            margin-bottom: 15px;
            text-align: center;
        }

        .btn-login {
            border-radius: 20px;
            padding: 8px 20px;
        }

        .error-msg {
            color: red;
            font-style: italic;
            font-size: 14px;
            margin-top: 10px;
        }

        .footer-link {
            margin-top: 15px;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="login-container">

    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRwH6ZDYlZC7FMbTbXVZiMuW-wzzOYYa9Jtbw&s" class="profile-img">

    <h2>Login</h2>

    <input type="text" id="username" class="form-control" placeholder="Enter username">
    <input type="password" id="password" class="form-control" placeholder="Enter password">

    <div class="form-check form-switch text-start">
        <input class="form-check-input" type="checkbox" id="stayLogged">
        <label class="form-check-label">Stay logged in</label>
    </div>

    <div id="error" class="error-msg"></div>

    <div class="mt-3">
        <button class="btn btn-primary btn-login" onclick="login()">Login</button>
        <button class="btn btn-secondary btn-login" onclick="clearForm()">Cancel</button>
    </div>

    <div class="footer-link">
        <a href="https://support.google.com/accounts/answer/7682439" target="_blank">
            Forgot username / password?
        </a>
    </div>

</div>

<script>
    let correctUsername = "Kenzo";
    let correctPassword = "Kenzorules!";
    let attempts = 0;

    function login() {
        let user = document.getElementById("username").value;
        let pass = document.getElementById("password").value;

        if (user === correctUsername && pass === correctPassword) {
           
            window.location.href = "notebooks.html";

        } else {
            attempts++;

            document.getElementById("error").innerHTML =
                "incorrect username and/or password. Attempt " + attempts + " of 3.";

            if (attempts >= 3) {
                alert("Too many attempts. Access denied.");
                document.querySelector("button").disabled = true;
            }
        }
    }

    function clearForm() {
        document.getElementById("username").value = "";
        document.getElementById("password").value = "";
        document.getElementById("error").innerHTML = "";
    }
</script>

</body>
</html>
